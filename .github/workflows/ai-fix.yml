name: AI Auto Fix
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  issues:
    types: [assigned]

jobs:
  fix-issue:
    if: contains(github.event.issue.title, '[AI]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install @google/generative-ai

      - name: Configure Git   
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Create AI Script
        run: |
          cat << 'EOF' > ai-script.mjs
          import { GoogleGenerativeAI } from "@google/generative-ai";
          import fs from "fs";
          import { execSync } from "child_process";

          const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);
          const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

          const issueTitle = process.env.ISSUE_TITLE;
          const issueBody = process.env.ISSUE_BODY || "No description provided";
          const issueNumber = process.env.ISSUE_NUMBER;

          console.log("🚀 GEMINI AI STARTED");
          console.log("Issue:", issueTitle);

          function readFileSafe(path) {
            try {
              return fs.readFileSync(path, "utf8");
            } catch {
              return "";
            }
          }

          const architecture = readFileSafe("docs/architecture.md");
          const conventions = readFileSafe("docs/conventions.md");
          const project = readFileSafe("docs/project.md");
          const skill = readFileSafe("skills/bug-fixer.md");

          const prompt = `
          You are a senior .NET developer.

          Fix this issue:

          Title:
          ${issueTitle}

          Description:
          ${issueBody}

          Project Context:
          ${project}

          Architecture:
          ${architecture}

          Conventions:
          ${conventions}

          Skill:
          ${skill}

          Tasks:
          1. Identify root cause
          2. Fix the issue
          3. Follow clean architecture

          IMPORTANT:
          - Return ONLY changed files
          - Include FULL file path
          - Provide COMPLETE code

          Format:

          FILE: path/to/file.cs
          CODE:
          <full code>
          `;

          const result = await model.generateContent(prompt);
          const output = result.response.text();

          console.log("AI OUTPUT:\n", output);

          fs.writeFileSync("ai-fix.txt", output);

          // Git operations
          execSync(`git checkout -b bugfix-${issueNumber}`);

          // TEMP demo change
          fs.appendFileSync("README.md", "\nAI Fix applied\n");

          execSync("git add .");
          execSync(`git commit -m "AI Fix: ${issueTitle}"`);
          execSync(`git push origin bugfix-${issueNumber}`);

          console.log("✅ DONE");
          EOF

      - name: Run AI Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node ai-script.mjs

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          branch: bugfix-${{ github.event.issue.number }}
          title: "AI Fix: ${{ github.event.issue.title }}"
          body: |
            🤖 Automated AI Fix using Gemini

            Issue: ${{ github.event.issue.title }}

            Generated automatically by AI workflow.
